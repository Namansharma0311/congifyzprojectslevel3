<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loading...</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #f5f4f3;
  }

  body {
    font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* ===== Loading overlay ===== */
  .loader-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f4f3;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  .loader-screen.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loader-viewport {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
    perspective: 200px;
    overflow: hidden;
  }

  /* container that holds all repeating rows, gets the perspective */
  .perspective-text {
    transform-style: preserve-3d;
    width: 100%;
    max-width: 56rem; /* ~4xl */
    position: relative;
    will-change: transform;
  }

  /* each repeated line of text */
  .perspective-text .text-row {
    text-align: center;
    font-weight: 700;
    font-size: 3.75rem; /* text-6xl */
    letter-spacing: -0.03em;
    color: #4fc3f7; /* light blue */
    white-space: nowrap;
    position: absolute;
    left: 0;
    width: 100%;
  }

  .perspective-text .fade-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 60vh;
    width: 100%;
    background: linear-gradient(to bottom, transparent, #f5f4f3);
    pointer-events: none;
    z-index: 5;
  }

  /* small progress indicator */
  .loader-progress {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    z-index: 6;
  }

  .loader-progress-track {
    width: 8rem;
    height: 4rem;
  }

  .infinity-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .infinity-track {
    fill: none;
    stroke: rgba(79, 195, 247, 0.2);
    stroke-width: 4;
  }

  .infinity-fill {
    fill: none;
    stroke: #4fc3f7;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 40 220; /* short moving segment length vs total path length */
    animation: infinityLoop 2s linear infinite;
  }

  @keyframes infinityLoop {
    0% {
      stroke-dashoffset: 0;
    }
    100% {
      stroke-dashoffset: -260; /* matches total path length so it loops seamlessly */
    }
  }

  .loader-progress-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4fc3f7;
    opacity: 0.7;
  }

  @media (max-width: 768px) {
    .perspective-text .text-row {
      font-size: 2rem;
    }
  }

  /* ===== Main site content (revealed after loading) ===== */
  .site-content {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f4f3;
    color: #111;
    font-size: 1.25rem;
    text-align: center;
    padding: 2rem;
  }
</style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div class="loader-screen" id="loaderScreen">
    <div class="loader-viewport">
      <div class="perspective-text" id="perspectiveText">
        <!-- Rows are generated by JS for an infinite, seamless loop -->
        <div class="fade-bottom"></div>
      </div>
      <div class="loader-progress">
        <span class="loader-progress-label" id="progressLabel">Loading</span>
        <div class="loader-progress-track">
          <svg class="infinity-svg" viewBox="0 0 200 100">
            <path
              class="infinity-track"
              d="M 50,50
                 C 50,25 75,25 100,50
                 C 125,75 150,75 150,50
                 C 150,25 125,25 100,50
                 C 75,75 50,75 50,50 Z"
            />
            <path
              class="infinity-fill"
              d="M 50,50
                 C 50,25 75,25 100,50
                 C 125,75 150,75 150,50
                 C 150,25 125,25 100,50
                 C 75,75 50,75 50,50 Z"
            />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN PAGE CONTENT (shown once loading finishes) -->
  <div class="site-content">
  </div>

<script>
  (function () {
    const container = document.getElementById("perspectiveText");
    const loaderScreen = document.getElementById("loaderScreen");
    const TEXT = "CONFIGYZ TECHNOLOGIES";

    // How much vertical space is between each repeated row (in px).
    const ROW_SPACING = 140;
    // How many rows to render above/below center so the loop always
    // has copies ready to scroll into view (infinite feel).
    const ROW_COUNT = 9; // odd number so one sits centered at rest
    const CENTER_INDEX = Math.floor(ROW_COUNT / 2);

    // Build the repeating rows once.
    const rows = [];
    for (let i = 0; i < ROW_COUNT; i++) {
      const row = document.createElement("div");
      row.className = "text-row";
      row.textContent = TEXT;
      container.insertBefore(row, container.querySelector(".fade-bottom"));
      rows.push(row);
    }

    // Total distance one full row-cycle covers, used to wrap positions
    // so rows recycle seamlessly (infinite loop) instead of running out.
    const CYCLE = ROW_SPACING * ROW_COUNT;

    function clamp(v, min, max) {
      return Math.min(Math.max(v, min), max);
    }

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function applyTransform(elapsedMs) {
      // Continuous auto-driven travel (time-based instead of scroll-based),
      // so rows keep flowing infinitely while the page loads.
      const speed = 0.18; // px per ms
      const totalTravel = elapsedMs * speed;

      rows.forEach((row, i) => {
        const baseOffset = (i - CENTER_INDEX) * ROW_SPACING;
        let y = mod(baseOffset - totalTravel + CYCLE * 1000, CYCLE) - CYCLE / 2;

        const edge = CYCLE / 2;
        const distFromCenter = Math.abs(y);
        const opacity = clamp(1 - distFromCenter / edge, 0, 1);

        row.style.opacity = opacity;
        row.style.transform =
          "translateY(" + y + "px) translateZ(" + (10 - distFromCenter * 0.05) + "px)";
      });

      container.style.transform = "rotateX(30deg) translateZ(10px)";
    }

    let startTime = null;
    let rafId = null;

    function loop(timestamp) {
      if (startTime === null) startTime = timestamp;
      const elapsed = timestamp - startTime;
      applyTransform(elapsed);
      rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);

    // ---- Loading screen duration ----
    // The infinity bar animates continuously via CSS, but the loading
    // SCREEN itself only stays up for a fixed 5-6 seconds, then fades out.
    const LOAD_DURATION = 5500; // ms

    function finishLoading() {
      loaderScreen.classList.add("hide");
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 900);
    }

    setTimeout(finishLoading, LOAD_DURATION);

    // If you'd rather hide as soon as the real page finishes loading
    // instead of a fixed timer, use this instead:
    // window.addEventListener("load", finishLoading);
  })();
</script>

</body>
</html>
